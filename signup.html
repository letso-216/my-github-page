<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOIN THE PACK | BIG D's GYM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
        
</head>
<body>

    <header>
       <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">BIG D's GYM</a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">The Floor</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">Philosophy</a></li>
        <li class="nav-item"><a class="nav-link" href="signup.html">Join</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="members.html">Members</a></li>
      </ul>
    </div>
  </div>
</nav>
    </header>

    <main class="container">
        <section class="signup-container">
            <h2 class="text-center text-uppercase mb-4">Pick Your Path</h2>
            <form>
                <div class="mb-3">
                    <label class="form-label fw-bold">FULL NAME</label>
                    <input type="text" class="form-control" placeholder="Enter your name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">EMAIL ADDRESS</label>
                    <input type="email" class="form-control" placeholder="email@example.com" required>
                </div>

                <div class="row mb-3 mt-4">
                    <div class="col-12">
                        <label class="form-label fw-bold d-block">ENTER YOUR GENDER:</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                            <label class="form-check-label" for="male">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="others" value="others">
                            <label class="form-check-label" for="others">Others</label>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">DATE OF BIRTH:</label>
                        <input type="date" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">ADDRESS:</label>
                        <textarea class="form-control" rows="1" placeholder="City, Country" required></textarea>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">CHOOSE YOUR INTENSITY</label>
                    <select class="form-control">
                        <option>The Breeze Tier</option>
                        <option>The Draft Tier</option>
                        <option>The Hurricane Tier</option>
                    </select>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label" for="terms">I UNDERSTAND THE WINDOWS STAY OPEN.</label>
                </div>

                <button type="submit" class="btn btn-success text-uppercase py-2">Commence the Grind</button>
            </form>
        </section>
    </main>

    <footer class="text-center py-4">
        <p>© 2026 BIG D's GYM | Windows: OPEN</p>
    </footer>
<script>
    document.querySelector('form').addEventListener('submit', function(event) {
        // Prevent actual form submission (since you are using GitHub Pages)
        event.preventDefault();
        
        // Redirect the user
        window.location.href = "success.html";
    });
</script>
</body>
</html>
